<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>因式分解挑戰 - 終極修復版</title>
    <style>
        :root { --x-s: 70px; --u-s: 28px; }
        @media (min-width: 600px) { :root { --x-s: 100px; --u-s: 40px; } }

        body { 
            font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif; 
            background: #f8f9fa; margin: 0; padding: 0;
            overflow: hidden; position: fixed; width: 100%; height: 100%;
            touch-action: none; /* 鎖定瀏覽器預設行為 */
        }

        #stat-bar { background: #2c3e50; color: white; padding: 12px; display: flex; justify-content: space-around; font-size: 16px; }
        
        #game-container { 
            position: relative; width: 95vw; height: 60vh; 
            margin: 10px auto; background: white; 
            border: 3px solid #34495e; border-radius: 12px; 
            overflow: hidden; touch-action: none;
        }
        
        .block { 
            position: absolute; display: flex; align-items: center; 
            justify-content: center; color: white; font-weight: bold; 
            border-radius: 6px; z-index: 10; user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            touch-action: none;
        }
        .x2 { width: var(--x-s); height: var(--x-s); background: #3498db; font-size: 20px; }
        .unit { width: var(--u-s); height: var(--u-s); background: #e74c3c; font-size: 12px; }
        .x-tile { background: #f1c40f; color: #333; }
        .x-v { width: var(--u-s); height: var(--x-s); }
        .x-h { width: var(--x-s); height: var(--u-s); }

        #msg-box { height: 100px; padding: 5px; }
        #hint-box { color: #d35400; font-size: 15px; font-weight: bold; margin-bottom: 5px; }
        #result-banner { font-size: 22px; color: #27ae60; font-weight: bold; }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        button { 
            padding: 12px 28px; font-size: 18px; cursor: pointer; 
            background: #34495e; color: white; border: none; border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .win-glow { animation: pulse 0.6s infinite alternate; box-shadow: 0 0 20px #2ecc71 !important; z-index: 50 !important; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div id="stat-bar">
        <div>題：<span id="target-eq">x² + 3x + 2</span></div>
        <div>⏱️：<span id="timer">0</span>s</div>
    </div>

    <div id="game-container"></div>

    <div id="msg-box">
        <div id="hint-box">💡 輕點黃色方塊旋轉，拼成長方形</div>
        <div id="result-banner"></div>
    </div>

    <div class="btn-group">
        <button id="check-btn" onclick="checkWin()">檢查</button>
        <button id="next-btn" style="display:none; background: #27ae60;" onclick="nextLevel()">下一題</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            {p:2, q:1}, {p:3, q:1}, {p:2, q:2}, {p:4, q:1}, {p:3, q:2},
            {p:5, q:1}, {p:4, q:2}, {p:3, q:3}, {p:5, q:2}, {p:4, q:3}
        ];
        let currentIdx = 0, seconds = 0, startTime;

        function initLevel() {
            const q = levels[currentIdx];
            const cw = $("#game-container").width(), ch = $("#game-container").height();
            $("#target-eq").text(`x² + ${q.p + q.q}x + ${q.p * q.q}`);
            $("#game-container").empty();
            $("#result-banner").empty();
            $("#next-btn").hide();
            $("#check-btn").show();

            $("<div class='block x2'>x²</div>").css({top: 20, left: 20}).appendTo("#game-container");

            for(let i=0; i < (q.p + q.q); i++) {
                let $x = $(`<div class="block x-tile x-v">x</div>`)
                    .css({ top: Math.random()*(ch-100)+20, left: Math.random()*(cw-80)+50 })
                    .appendTo("#game-container");
                
                // 修正後的點擊旋轉邏輯
                let pressTimer;
                $x.on('pointerdown', function() { startTime = Date.now(); });
                $x.on('pointerup', function() {
                    let duration = Date.now() - startTime;
                    if(duration < 200) { // 快速點擊才旋轉
                        $(this).toggleClass("x-v").toggleClass("x-h");
                    }
                });
            }

            for(let i=0; i < (q.p * q.q); i++) {
                $("<div class='block unit'>1</div>").css({top: Math.random()*(ch-50)+30, left: Math.random()*(cw-50)+50}).appendTo("#game-container");
            }

            $(".block").draggable({ containment: "parent", snap: ".block", snapTolerance: 10 });
        }

        function checkWin() {
            const q = levels[currentIdx];
            const v = $(".x-v").length, h = $(".x-h").length;
            if ((v===q.p && h===q.q) || (v===q.q && h===q.p)) {
                $(".block").addClass("win-glow").draggable("disable");
                $("#result-banner").html(`✨ (x + ${q.p})(x + ${q.q}) ✨`);
                $("#next-btn").show();
                $("#check-btn").hide();
            } else {
                $("#hint-box").text(`❌ 提示：需 ${q.p}直 ${q.q}橫 (或反之)` ).css("color","#e74c3c");
                setTimeout(()=>$("#hint-box").css("color","#d35400"), 1000);
            }
        }

        function nextLevel() { currentIdx = (currentIdx + 1) % levels.length; initLevel(); }

        setInterval(() => { seconds++; $("#timer").text(seconds); }, 1000);
        window.oncontextmenu = () => false;
        initLevel();
    </script>
</body>
</html>
