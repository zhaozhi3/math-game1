<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>因式分解甜點屋 🍬</title>
    <style>
        :root { --x-s: 90px; --u-s: 38px; }
        @media (min-width: 800px) { :root { --x-s: 110px; --u-s: 46px; } }

        body { 
            font-family: "Comic Sans MS", "Chalkboard SE", "Microsoft JhengHei", sans-serif; 
            background: #fff5f8; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 粉嫩標題區 */
        #header { 
            background: #ffebf2; padding: 15px; text-align: center;
            border-bottom: 4px solid #ffc2d4; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #target-eq { font-size: 28px; color: #ff5c8d; font-weight: bold; text-shadow: 2px 2px 0px white; }

        /* 遊戲區域：粉藍色格子 */
        #game-container { 
            position: relative; flex-grow: 1; width: 95vw; max-width: 800px;
            margin: 15px auto; background: #ffffff; border: 6px solid #ffc2d4;
            border-radius: 30px; overflow: hidden;
            background-image: radial-gradient(#ffecf2 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        /* 糖果方塊樣式 */
        .block { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; border-radius: 12px; z-index: 10;
            cursor: grab; border: 3px solid rgba(255,255,255,0.4);
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .block:active { cursor: grabbing; transform: scale(1.1) rotate(3deg); }

        /* x^2: 藍莓巧克力 */
        .x2 { width: var(--x-s); height: var(--x-s); background: #71b1ff; font-size: 26px; }
        /* x: 檸檬糖棒 */
        .x-tile { background: #ffd93d; color: #856404; font-size: 20px; }
        .x-v { width: var(--u-s); height: var(--x-s); border-radius: 20px; }
        .x-h { width: var(--x-s); height: var(--u-s); border-radius: 20px; }
        /* 1: 草莓軟糖 */
        .unit { width: var(--u-s); height: var(--u-s); background: #ff6b6b; border-radius: 50%; font-size: 16px; }

        /* 成功特效：閃閃發光 */
        .win-glow { 
            animation: candy-bounce 0.5s infinite alternate; 
            box-shadow: 0 0 20px #ff5c8d !important;
            filter: brightness(1.1);
        }
        @keyframes candy-bounce { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* 底部按鈕區 */
        #footer { padding: 20px; text-align: center; }
        #hint-text { color: #ff85a1; font-size: 18px; font-weight: bold; margin-bottom: 15px; min-height: 25px; }
        
        button { 
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: #ff5c8d; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 0px #d43f6d; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0px #d43f6d; }
        #next-btn { background: #47d195; box-shadow: 0 6px 0px #2e8b62; }
    </style>
</head>
<body>

    <div id="header">
        <div id="target-eq">x² + 3x + 2</div>
        <div style="font-size: 16px; color: #ff85a1;">🍬 剩餘糖果：<span id="lv-num">1</span>/10 份</div>
    </div>

    <div id="game-container"></div>

    <div id="footer">
        <div id="hint-text">點點糖果棒可以轉向喔！🍭</div>
        <button id="check-btn" onclick="checkWin()">包裝糖果 (檢查)</button>
        <button id="next-btn" style="display:none;" onclick="nextLevel()">做下一份！✨</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            {p:2, q:1}, {p:3, q:1}, {p:2, q:2}, {p:4, q:1}, {p:3, q:2},
            {p:5, q:1}, {p:4, q:2}, {p:3, q:3}, {p:5, q:2}, {p:4, q:3}
        ];
        let currentIdx = 0;

        function initLevel() {
            const q = levels[currentIdx];
            const cw = $("#game-container").width(), ch = $("#game-container").height();

            $("#target-eq").text(`x² + ${q.p + q.q}x + ${q.p * q.q}`);
            $("#lv-num").text(currentIdx + 1);
            $("#game-container").empty();
            $("#next-btn").hide();
            $("#check-btn").show();
            $("#hint-text").text("點點糖果棒可以轉向喔！🍭").css("color", "#ff85a1");

            // 生成核心巧克力
            $("<div class='block x2'>x²</div>")
                .css({top: 40, left: 40})
                .appendTo("#game-container");

            // 生成糖果棒 x
            for(let i=0; i < (q.p + q.q); i++) {
                let $x = $(`<div class="block x-tile x-v">x</div>`)
                    .css({ 
                        top: Math.random() * (ch - 150) + 50, 
                        left: Math.random() * (cw - 200) + 150
                    })
                    .appendTo("#game-container");
                bindCandyClick($x);
            }

            // 生成小軟糖 1
            for(let i=0; i < (q.p * q.q); i++) {
                $("<div class='block unit'>1</div>")
                    .css({ 
                        top: Math.random() * (ch - 100) + 50, 
                        left: Math.random() * (cw - 200) + 150
                    })
                    .appendTo("#game-container");
            }

            $(".block").draggable({ 
                containment: "parent", 
                snap: ".block", 
                snapTolerance: 15,
                start: function() { $(this).css("z-index", 100); }
            });
        }

        function bindCandyClick(el) {
            let startT;
            el.on('pointerdown', () => startT = Date.now());
            el.on('pointerup', function() {
                if (Date.now() - startT < 200) {
                    $(this).toggleClass("x-v").toggleClass("x-h");
                }
            });
        }

        function checkWin() {
            const q = levels[currentIdx];
            const v = $(".x-v").length, h = $(".x-h").length;
            
            if ((v===q.p && h===q.q) || (v===q.q && h===q.p)) {
                $(".block").addClass("win-glow").draggable("disable");
                $("#hint-text").html(`🎉 甜點製作成功！(x + ${q.p})(x + ${q.q})`);
                $("#next-btn").show();
                $("#check-btn").hide();
                // 噴灑糖果紙特效
                confetti({
                    particleCount: 100, spread: 70, origin: { y: 0.6 },
                    colors: ['#ff6b6b', '#ffd93d', '#71b1ff', '#ff85a1']
                });
            } else {
                $("#hint-text").text(`哎呀！數量不對喔，需要 ${q.p}直 ${q.q}橫。`).css("color","#ff4d4d");
            }
        }

        function nextLevel() {
            currentIdx = (currentIdx + 1) % levels.length;
            initLevel();
        }

        $(window).on('load', initLevel);
    </script>
</body>
</html>
