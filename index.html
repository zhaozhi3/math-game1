<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>因式分解 - 靈敏觸控版</title>
    <style>
        :root { --x-s: 75px; --u-s: 30px; }
        @media (min-width: 600px) { :root { --x-s: 100px; --u-s: 40px; } }

        body { 
            font-family: sans-serif; background: #ecf0f1; margin: 0; padding: 0;
            overflow: hidden; position: fixed; width: 100%; height: 100%;
            touch-action: none; /* 徹底禁用瀏覽器預設手勢 */
        }

        #stat-bar { background: #34495e; color: white; padding: 10px; display: flex; justify-content: space-around; font-size: 14px; z-index: 100; position: relative; }
        
        #game-container { 
            position: relative; width: 95vw; height: 65vh; 
            margin: 10px auto; background: white; 
            border: 2px solid #2c3e50; border-radius: 10px; 
            overflow: hidden; 
        }
        
        .block { 
            position: absolute; display: flex; align-items: center; 
            justify-content: center; color: white; font-weight: bold; 
            border-radius: 4px; z-index: 10; user-select: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            touch-action: none; /* 讓 jQuery UI Touch Punch 更好運作 */
        }
        .x2 { width: var(--x-s); height: var(--x-s); background: #3498db; }
        .unit { width: var(--u-s); height: var(--u-s); background: #e74c3c; }
        .x-tile { background: #f1c40f; color: #333; transition: width 0.1s, height 0.1s; }
        .x-v { width: var(--u-s); height: var(--x-s); }
        .x-h { width: var(--x-s); height: var(--u-s); }

        #hint-box { color: #e67e22; font-size: 14px; margin: 5px; font-weight: bold; min-height: 20px; }
        #result-banner { font-size: 20px; color: #27ae60; font-weight: bold; min-height: 30px; }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 8px; }

        .win-glow { animation: pulse 0.5s infinite alternate; box-shadow: 0 0 15px #2ecc71 !important; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="stat-bar">
        <div>題目：<span id="target-eq">x² + 3x + 2</span></div>
        <div>⏱️：<span id="timer">0</span>s</div>
    </div>

    <div id="game-container"></div>

    <div id="hint-box">💡 輕觸黃色方塊即可旋轉</div>
    <div id="result-banner"></div>

    <div class="btn-group">
        <button id="check-btn" onclick="checkWin()">檢查</button>
        <button id="next-btn" style="display:none; background: #27ae60;" onclick="nextLevel()">下一題</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            {p:2, q:1}, {p:3, q:1}, {p:2, q:2}, {p:4, q:1}, {p:3, q:2},
            {p:5, q:1}, {p:4, q:2}, {p:3, q:3}, {p:5, q:2}, {p:4, q:3}
        ];
        let currentIdx = 0, seconds = 0, isDragging = false, startX, startY;

        function initLevel() {
            const q = levels[currentIdx];
            const cw = $("#game-container").width();
            const ch = $("#game-container").height();

            $("#target-eq").text(`x² + ${q.p + q.q}x + ${q.p * q.q}`);
            $("#game-container").empty();
            $("#result-banner").empty();
            $("#next-btn").hide();
            $("#check-btn").show();

            // 生成 x2
            $("<div class='block x2'>x²</div>").css({top: 20, left: 20}).appendTo("#game-container");

            // 生成 x (加入智慧旋轉判定)
            for(let i=0; i < (q.p + q.q); i++) {
                let $x = $(`<div class="block x-tile x-v">x</div>`)
                    .css({ top: Math.random()*(ch-100)+20, left: Math.random()*(cw-80)+40 })
                    .appendTo("#game-container");

                // 靈敏點擊邏輯
                $x.on('touchstart', function(e) {
                    isDragging = false;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                }).on('touchmove', function(e) {
                    let moveX = Math.abs(e.touches[0].clientX - startX);
                    let moveY = Math.abs(e.touches[0].clientY - startY);
                    if(moveX > 5 || moveY > 5) isDragging = true; // 有位移就不算點擊
                }).on('touchend', function() {
                    if(!isDragging) {
                        $(this).toggleClass("x-v").toggleClass("x-h");
                    }
                });
            }

            // 生成 1
            for(let i=0; i < (q.p * q.q); i++) {
                $("<div class='block unit'>1</div>").css({top: Math.random()*(ch-50)+20, left: Math.random()*(cw-50)+40}).appendTo("#game-container");
            }

            $(".block").draggable({ containment: "parent", snap: ".block", snapTolerance: 10 });
        }

        function checkWin() {
            const q = levels[currentIdx];
            const v = $(".x-v").length, h = $(".x-h").length;
            if ((v===q.p && h===q.q) || (v===q.q && h===q.p)) {
                $(".block").addClass("win-glow").draggable("disable");
                $("#hint-box").text("🎊 完美！");
                $("#result-banner").html(`(x + ${q.p})(x + ${q.q})`);
                $("#next-btn").show();
                $("#check-btn").hide();
            } else {
                $("#hint-box").text(`❌ 需要 ${q.p}直${q.q}橫 (或反之)` ).css("color","#e74c3c");
                setTimeout(()=>$("#hint-box").css("color","#e67e22"), 800);
            }
        }

        function nextLevel() { currentIdx = (currentIdx + 1) % levels.length; initLevel(); }

        setInterval(() => { seconds++; $("#timer").text(seconds); }, 1000);
        initLevel();
    </script>
</body>
</html>
