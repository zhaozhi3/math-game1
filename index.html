<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>因式分解幾何大賽 - 觸控優化版</title>
    <style>
        :root { --x-s: 80px; --u-s: 32px; } /* 縮小一點以適應平板 */
        body { font-family: "Microsoft JhengHei", sans-serif; background: #ecf0f1; text-align: center; margin: 0; padding: 0; touch-action: manipulation; }
        
        #stat-bar { background: #2c3e50; color: white; padding: 10px; display: flex; justify-content: space-around; flex-wrap: wrap; font-size: 16px; }
        #game-container { 
            position: relative; width: 95vw; height: 60vh; max-width: 800px;
            margin: 10px auto; background: white; 
            border: 3px solid #34495e; border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden;
        }
        
        .block { position: absolute; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 4px; z-index: 10; user-select: none; box-sizing: border-box; }
        .x2 { width: var(--x-s); height: var(--x-s); background: #3498db; font-size: 20px; border: 1px solid #2980b9; }
        .unit { width: var(--u-s); height: var(--u-s); background: #e74c3c; border: 1px solid #c0392b; }
        .x-tile { background: #f1c40f; color: #333; border: 1px solid #d4ac0d; transition: width 0.2s, height 0.2s; }
        .x-v { width: var(--u-s); height: var(--x-s); }
        .x-h { width: var(--x-s); height: var(--u-s); }

        .win-glow { animation: win-pulse 0.5s infinite alternate; z-index: 100 !important; }
        @keyframes win-pulse { from { transform: scale(1); box-shadow: 0 0 10px #2ecc71; } to { transform: scale(1.05); box-shadow: 0 0 20px #2ecc71; } }
        
        #result-banner { font-size: 24px; color: #27ae60; margin: 10px; font-weight: bold; min-height: 30px; }
        .instruction { color: #7f8c8d; font-size: 14px; padding: 0 10px; }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 8px; margin: 5px; -webkit-appearance: none; }
        
        #final-score { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.3); z-index: 1000; width: 80%; }
    </style>
</head>
<body>

    <div id="stat-bar">
        <div>題目：<span id="target-eq">x² + 3x + 2</span></div>
        <div>進度：<span id="lv-num">1</span>/10</div>
        <div>⏱️：<span id="timer">0</span>s</div>
    </div>

    <p class="instruction">🖱️ 電腦：左鍵拖曳 / 右鍵旋轉<br>📱 平板：直接拖曳 / <b>點擊一下</b>即可旋轉</p>

    <div id="game-container"></div>
    <div id="result-banner"></div>

    <div id="ctrls">
        <button onclick="checkWin()">檢查答案</button>
        <button id="next-btn" style="display:none; background: #27ae60;" onclick="nextLevel()">下一題</button>
    </div>

    <div id="final-score">
        <h1>🏆 挑戰完成！</h1>
        <p>總耗時：<span id="total-time"></span> 秒</p>
        <button onclick="location.reload()">重新開始</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            {p:2, q:1}, {p:3, q:1}, {p:2, q:2}, {p:4, q:1}, {p:3, q:2},
            {p:5, q:1}, {p:4, q:2}, {p:3, q:3}, {p:5, q:2}, {p:4, q:3}
        ];
        let currentIdx = 0, seconds = 0, timerInterval;

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { seconds++; $("#timer").text(seconds); }, 1000);
        }

        function initLevel() {
            const q = levels[currentIdx];
            $("#target-eq").text(`x² + ${q.p + q.q}x + ${q.p * q.q}`);
            $("#lv-num").text(currentIdx + 1);
            $("#game-container").empty();
            $("#result-banner").empty();
            $("#next-btn").hide();

            $("<div class='block x2'>x²</div>").css({top: 40, left: 40}).appendTo("#game-container");

            for(let i=0; i < (q.p + q.q); i++) {
                let isV = Math.random() > 0.5;
                $(`<div class="block x-tile ${isV ? 'x-v' : 'x-h'}">x</div>`)
                    .css({ top: Math.random()*200 + 50, left: Math.random()*200 + 150 })
                    .appendTo("#game-container")
                    .on('mousedown touchend', function(e) {
                        // 防止拖曳觸發點擊，使用時間差或簡單位移判斷
                        if (e.type === 'mousedown' && e.button !== 2) return; 
                        $(this).toggleClass("x-v").toggleClass("x-h");
                    });
            }

            for(let i=0; i < (q.p * q.q); i++) {
                $("<div class='block unit'>1</div>").css({top: Math.random()*200 + 200, left: Math.random()*200 + 150}).appendTo("#game-container");
            }

            $(".block").draggable({ containment: "#game-container", snap: ".block", snapTolerance: 8 });
        }

        function checkWin() {
            const q = levels[currentIdx];
            $(".block").addClass("win-glow").draggable("disable");
            $("#result-banner").html(`(x + ${q.p})(x + ${q.q})`);
            $("#next-btn").show();

            if (currentIdx === levels.length - 1) {
                clearInterval(timerInterval);
                setTimeout(() => { $("#total-time").text(seconds); $("#final-score").fadeIn(); }, 1000);
            }
        }

        function nextLevel() { currentIdx++; initLevel(); }

        window.oncontextmenu = function() { return false; }; // 禁用右鍵選單
        initLevel();
        startTimer();
    </script>
</body>
</html>
