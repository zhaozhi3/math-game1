<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>因式分解挑戰 - 手機優化版</title>
    <style>
        /* 變數設定：手機上自動縮小尺寸 */
        :root { --x-s: 70px; --u-s: 28px; }
        @media (min-width: 600px) { :root { --x-s: 100px; --u-s: 40px; } }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: #ecf0f1; margin: 0; padding: 0;
            overflow: hidden; /* 防止手機晃動 */
            position: fixed; width: 100%; height: 100%;
        }

        #stat-bar { 
            background: #34495e; color: white; padding: 10px; 
            display: flex; justify-content: space-around; font-size: 14px; 
        }

        #game-container { 
            position: relative; width: 95vw; height: 65vh; 
            margin: 5px auto; background: white; 
            border: 2px solid #2c3e50; border-radius: 10px; 
            overflow: hidden; touch-action: none; /* 重要：防止瀏覽器手勢干擾 */
        }
        
        .block { 
            position: absolute; display: flex; align-items: center; 
            justify-content: center; color: white; font-weight: bold; 
            border-radius: 4px; z-index: 10; user-select: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .x2 { width: var(--x-s); height: var(--x-s); background: #3498db; }
        .unit { width: var(--u-s); height: var(--u-s); background: #e74c3c; }
        .x-tile { background: #f1c40f; color: #333; }
        .x-v { width: var(--u-s); height: var(--x-s); }
        .x-h { width: var(--x-s); height: var(--u-s); }

        #hint-box { color: #e67e22; font-size: 14px; margin: 5px; height: 20px; font-weight: bold; }
        #result-banner { font-size: 20px; color: #27ae60; font-weight: bold; height: 30px; }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        button { 
            padding: 10px 20px; font-size: 16px; cursor: pointer; 
            background: #2c3e50; color: white; border: none; border-radius: 5px;
        }

        .win-glow { animation: pulse 0.5s infinite alternate; border: 2px solid #fff; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="stat-bar">
        <div>題目：<span id="target-eq">x² + 3x + 2</span></div>
        <div>⏱️：<span id="timer">0</span>s</div>
    </div>

    <div id="game-container"></div>

    <div id="hint-box">💡 點擊黃色方塊可旋轉</div>
    <div id="result-banner"></div>

    <div class="btn-group">
        <button onclick="checkWin()">檢查</button>
        <button id="next-btn" style="display:none; background: #27ae60;" onclick="nextLevel()">下一題</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            {p:2, q:1}, {p:3, q:1}, {p:2, q:2}, {p:4, q:1}, {p:3, q:2},
            {p:5, q:1}, {p:4, q:2}, {p:3, q:3}, {p:5, q:2}, {p:4, q:3}
        ];
        let currentIdx = 0, seconds = 0;

        function initLevel() {
            const q = levels[currentIdx];
            const containerW = $("#game-container").width();
            const containerH = $("#game-container").height();

            $("#target-eq").text(`x² + ${q.p + q.q}x + ${q.p * q.q}`);
            $("#game-container").empty();
            $("#result-banner").empty();
            $("#hint-box").text("💡 點擊黃色方塊可旋轉").css("color", "#e67e22");
            $("#next-btn").hide();

            // 1. 生成 x2 (放在左上角附近)
            $("<div class='block x2' id='main-x'>x²</div>").css({top: 20, left: 20}).appendTo("#game-container");

            // 2. 生成 x (限制在螢幕內)
            for(let i=0; i < (q.p + q.q); i++) {
                $(`<div class="block x-tile x-v">x</div>`)
                    .css({ 
                        top: Math.random() * (containerH - 120) + 50, 
                        left: Math.random() * (containerW - 100) + 50 
                    })
                    .appendTo("#game-container")
                    .on('click', function() { $(this).toggleClass("x-v").toggleClass("x-h"); });
            }

            // 3. 生成 1
            for(let i=0; i < (q.p * q.q); i++) {
                $("<div class='block unit'>1</div>")
                    .css({ 
                        top: Math.random() * (containerH - 80) + 50, 
                        left: Math.random() * (containerW - 80) + 50 
                    })
                    .appendTo("#game-container");
            }
            $(".block").draggable({ containment: "parent", snap: ".block", snapTolerance: 8 });
        }

        function checkWin() {
            const q = levels[currentIdx];
            const vCount = $(".x-v").length;
            const hCount = $(".x-h").length;

            if ((vCount === q.p && hCount === q.q) || (vCount === q.q && hCount === q.p)) {
                $(".block").addClass("win-glow").draggable("disable");
                $("#hint-box").text("🎊 完美拼合！");
                $("#result-banner").html(`答案：(x + ${q.p})(x + ${q.q})`);
                $("#next-btn").show();
            } else {
                $("#hint-box").text(`❌ 提示：需 ${q.p} 直 ${q.q} 橫 (或反之)`);
                $("#hint-box").css("color", "#e74c3c");
            }
        }

        function nextLevel() { currentIdx = (currentIdx + 1) % levels.length; initLevel(); }

        setInterval(() => { seconds++; $("#timer").text(seconds); }, 1000);
        initLevel();
    </script>
</body>
</html>
